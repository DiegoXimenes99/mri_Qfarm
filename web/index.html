<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI QBOX Farm System</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" style="display: none;">
        <header>
            <h1>ROTA DE <span>FARME</span></h1>
            <div style="display: flex; gap: 8px;">
                <button class="close-btn" onclick="refreshFarms()" title="Atualizar Tudo">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button class="close-btn" id="close-nui" title="Fechar">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </header>

        <main id="main-content">
            <!-- Farm Selection Page -->
            <div id="farm-selector" class="page">
                <div class="farm-grid" id="farm-list">
                    <!-- Cards injected via JS -->
                </div>
                <div id="cancel-container" style="margin-top: 32px; display: flex; justify-content: center;"></div>
            </div>

            <!-- Creator Dashboard Page -->
            <div id="farm-creator" class="page" style="display: none;">
                <div class="dashboard-container">
                    <!-- Top Navigation Bar -->
                    <nav class="top-nav">
                        <div class="nav-item active" data-tab="general">
                            <i class="fa-solid fa-gear"></i> GERAL
                        </div>
                        <div class="nav-item" data-tab="items">
                            <i class="fa-solid fa-boxes-stacked"></i> ITENS
                        </div>
                        <div class="nav-item" data-tab="points">
                            <i class="fa-solid fa-location-dot"></i> PONTOS
                        </div>
                        <div class="nav-item" data-tab="groups">
                            <i class="fa-solid fa-users"></i> ACESSO
                        </div>
                    </nav>

                    <div class="content-panel" id="creator-panel">
                        <!-- Route Selection View (default) -->
                        <div id="creator-route-view">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                                <h3 style="font-size: 1.25rem; font-weight: 700;">Gerenciar Rotas</h3>
                                <button class="btn btn-success" id="create-new-farm-btn"><i class="fa-solid fa-plus"></i> NOVA ROTA</button>
                            </div>
                            <div class="farm-grid" id="creator-route-list">
                                <!-- Farm cards for editing -->
                            </div>
                        </div>

                        <!-- Editor Tabs (hidden until route selected) -->
                        <div id="creator-editor-view" style="display: none;">
                            <div id="tab-content">
                                <!-- Content injected via JS based on active tab -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Reusable Modal System -->
    <div id="modal-container" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; justify-content: center; align-items: center;">
        <div class="modal-box" style="width: 440px; background: var(--surface-page); border: 1px solid var(--border-default);">
            <h3 id="modal-title">Título do Modal</h3>
            <div id="modal-body" style="margin: 24px 0; color: var(--text-secondary); font-size: 0.95rem;">
                <!-- Body content injected here -->
            </div>
            <div id="modal-footer" style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px;">
                <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
                <button class="btn btn-primary" id="modal-confirm">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
